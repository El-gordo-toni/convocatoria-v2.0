<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:url("{{ bg_path if bg_path else 'https://images.unsplash.com/photo-1599058917765-a780eda07a3e' }}") center/cover no-repeat fixed;
    color:white;
}

.overlay{ background:rgba(0,0,0,0.85); min-height:100vh; padding:15px; }
.container{ max-width:500px; margin:auto; }

.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:16px;
    margin-bottom:12px;
}

input, select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-bottom:10px;
    font-size:16px;
    background:white;
}

select{
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 20 20'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f7a3f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn-delete{ background:red; width:auto; padding:6px 10px; }
.admin-card{ border:2px solid #1f7a3f; }

a { text-decoration:none; }
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<h2 style="text-align:center;">{{ config.titulo }}</h2>
<p style="text-align:center;">{{ config.subtitulo }}</p>
<p style="text-align:center;">{{ config.subtitulo2 }}</p>
<p style="text-align:center;">{{ config.subtitulo3 }}</p>

<!-- BOTON ADMIN -->

<!-- FORM -->
<div class="card">
<form action="/agregar" method="POST">

<input name="nombre" placeholder="Nombre" required>
<input name="apellido" placeholder="Apellido" required>

<select name="equipo" required>
<option value="" disabled selected>Seleccionar equipo</option>
<option value="Team 22">🏌️ Team 22</option>
<option value="Aguilas">🦅 Águilas</option>
</select>

{% if menu_activo %}
<select name="asistencia" required>
<option value="" disabled selected>Seleccionar horario</option>

{% for op in menu_opciones %}
{% if op %}
<option value="{{ op }}">{{ op }}</option>
{% endif %}
{% endfor %}

</select>
{% endif %}

<button type="submit">Anotarme</button>
</form>
</div>

{% if config.whatsapp_activo %}
<div class="card">
<button onclick="compartir()">📲 Compartir</button>
</div>
{% endif %}

<!-- LISTAS -->
<div class="card">
<select class="bloqueado" id="team22">
<option disabled selected>🏌️ Team 22 (...) Tocar para ver</option>
</select>
</div>

<div class="card">
<select class="bloqueado" id="aguilas">
<option disabled selected>🦅 Águilas (...) Tocar para ver</option>
</select>
</div>

<div class="card">
<select class="bloqueado">
<option disabled selected>
🏌️ HDCP ({{ handicaps|length }}) Tocar para ver
</option>
{% for h in handicaps|sort(attribute='nombre') %}
<option disabled>{{ h.nombre }} - {{ h.hdcp }}</option>
{% endfor %}
</select>
</div>

<!-- PANEL ADMIN -->
{% if admin %}
<div class="card admin-card">

<h3>⚙️ Panel Admin</h3>

<h3>📝 Configurar textos</h3>

<form method="POST" action="/update_config">

<input name="titulo" value="{{ config.titulo }}" placeholder="Título">
<input name="subtitulo" value="{{ config.subtitulo }}" placeholder="Subtítulo 1">
<input name="subtitulo2" value="{{ config.subtitulo2 }}" placeholder="Subtítulo 2">
<input name="subtitulo3" value="{{ config.subtitulo3 }}" placeholder="Subtítulo 3">

<!-- 🔥 MENU ACTIVO -->
<label style="display:block;margin:10px 0;">
    <input type="checkbox" name="menu_activo"
        {% if config.menu_activo %}checked{% endif %}>
    Activar menú de horarios
</label>

<!-- 🔥 WHATSAPP ACTIVO -->
<label style="display:block;margin:10px 0;">
    <input type="checkbox" name="whatsapp_activo"
        {% if config.whatsapp_activo %}checked{% endif %}>
    Activar botón WhatsApp
</label>

<button type="submit">💾 Guardar cambios</button>
</form>
<form action="/upload_hdcp" method="POST" enctype="multipart/form-data">
    <input type="file" name="file" accept=".xlsx" required>
    <button type="submit">📥 Subir Excel HDCP</button>
</form>
<a href="/export"><button>📤 Exportar Excel</button></a>
<a href="/reset"><button>♻️ Resetear participantes</button></a>
<a href="/logout"><button>🚪 Cerrar sesión</button></a>

<!-- FIX BACKEND: name="imagen" -->
<form action="/upload_bg" method="POST" enctype="multipart/form-data">
    <input type="file" name="imagen" accept="image/*" required>
    <button type="submit">🖼️ Subir fondo</button>
</form>

</div>
{% endif %}

</div>
</div>

<script>

function cargarParticipantes(){
    fetch("/participantes")
        .then(res => res.json())
        .then(data => {

            const team22 = document.getElementById("team22");
            const aguilas = document.getElementById("aguilas");

            team22.innerHTML = '<option disabled selected>🏌️ Team 22 (...) Tocar para ver</option>';
            aguilas.innerHTML = '<option disabled selected>🦅 Águilas (...) Tocar para ver</option>';

            let c1 = 0;
            let c2 = 0;

            data.forEach(p => {
                const option = document.createElement("option");
                option.textContent = p.nombre + " " + p.apellido;
                option.disabled = true;

                if(p.equipo === "Team 22"){
                    team22.appendChild(option);
                    c1++;
                }

                if(p.equipo === "Aguilas"){
                    aguilas.appendChild(option);
                    c2++;
                }
            });

            team22.options[0].textContent = `🏌️ Team 22 (${c1}) Tocar para ver`;
            aguilas.options[0].textContent = `🦅 Águilas (${c2}) Tocar para ver`;
        });
}

cargarParticipantes();
setInterval(cargarParticipantes, 2000);

function compartir(){
    window.open("https://wa.me/?text="+encodeURIComponent(window.location.href));
}

document.querySelectorAll(".bloqueado").forEach(select => {
    select.addEventListener("change", function(){
        this.selectedIndex = 0;
    });
});

</script>

</body>
</html>

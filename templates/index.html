<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SOCKET ACTUALIZADO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:url("{{ bg_path if bg_path else 'https://images.unsplash.com/photo-1599058917765-a780eda07a3e' }}?v={{ config.id }}") center/cover no-repeat fixed;
    color:white;
}
.overlay{ background:rgba(0,0,0,0.85); min-height:100vh; padding:15px; }
.container{ max-width:500px; margin:auto; }
.card{ background:white; color:black; padding:15px; border-radius:16px; margin-bottom:12px; }

input, select{
    width:100%; padding:14px; border-radius:12px; border:1px solid #ccc;
    margin-bottom:10px; font-size:16px; background:white;
}

select{
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 20 20'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
}

button{
    width:100%; padding:14px; border:none; border-radius:12px;
    background:#1f7a3f; color:white; font-weight:bold;
}

.btn-delete{ background:red; width:auto; padding:6px 10px; }
.admin-card{ border:2px solid #1f7a3f; }
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<h2 style="text-align:center;">{{ config.titulo }}</h2>
<p style="text-align:center;">{{ config.subtitulo }}</p>
<p style="text-align:center;">{{ config.subtitulo2 }}</p>
<p style="text-align:center;">{{ config.subtitulo3 }}</p>

<!-- FORM -->
<div class="card">
<form onsubmit="enviar(event)">
<input name="nombre" placeholder="Nombre" required>
<input name="apellido" placeholder="Apellido" required>

<select id="equipo" required>
<option value="" disabled selected>Seleccionar equipo</option>
<option value="Team 22">🏌️ Team 22</option>
<option value="Aguilas">🦅 Águilas</option>
</select>

{% if menu_activo %}
<select id="asistencia" required>
<option value="" disabled selected>Seleccionar Menu</option>
{% for op in menu_opciones %}
<option value="{{ op }}">{{ op }}</option>
{% endfor %}
</select>
{% endif %}

<button>Anotarme</button>
</form>
</div>

{% if config.whatsapp_activo %}
<div class="card">
<button onclick="compartir()">📲 Compartir</button>
</div>
{% endif %}

<!-- LISTAS BLOQUEADAS -->
<div class="card">
<select class="bloqueado">
<option disabled selected>
🏌️ Team 22 ({{ participantes|selectattr('equipo','equalto','Team 22')|list|length }}) Tocar para ver
</option>
{% for p in participantes if p.equipo == "Team 22" %}
<option disabled>{{ p.nombre }} {{ p.apellido }}</option>
{% endfor %}
</select>
</div>

<div class="card">
<select class="bloqueado">
<option disabled selected>
🦅 Águilas ({{ participantes|selectattr('equipo','equalto','Aguilas')|list|length }}) Tocar para ver
</option>
{% for p in participantes if p.equipo == "Aguilas" %}
<option disabled>{{ p.nombre }} {{ p.apellido }}</option>
{% endfor %}
</select>
</div>

<div class="card">
<select class="bloqueado">
<option disabled selected>
🏌️ HDCP ({{ handicaps|length }}) Tocar para ver
</option>
{% for h in handicaps|sort(attribute='nombre') %}
<option disabled>{{ h.nombre }} - {{ h.hdcp }}</option>
{% endfor %}
</select>
</div>

</div>
</div>

<!-- SCRIPT LIMPIO -->
<script>
const socket = io(window.location.origin, {
    transports: ["polling"]
});

// conexión
socket.on("connect", () => console.log("✅ Conectado"));
socket.on("connect_error", (err) => console.log("❌ Error:", err));

// enviar datos
function enviar(e){
    e.preventDefault();

    socket.emit("nuevo_participante", {
        nombre: document.querySelector('[name="nombre"]').value,
        apellido: document.querySelector('[name="apellido"]').value,
        equipo: document.getElementById("equipo").value,
        asistencia: document.getElementById("asistencia")?.value
    });
}

// actualizar lista
socket.on("actualizar_lista", ()=>{
    setTimeout(()=>location.reload(), 10);
});

// compartir
function compartir(){
    window.open("https://wa.me/?text="+encodeURIComponent(window.location.href));
}

// bloquear solo listas
document.querySelectorAll(".bloqueado").forEach(select => {
    select.addEventListener("change", function(){
        this.selectedIndex = 0;
    });
});
</script>

</body>
</html>
